# Any Sync Workflow Proto Schema And Generated Code Update

## Action

Follow the proto-schema-and-generated-code-update workflow:
1. Edit one or more .proto files (e.g., add/remove fields, messages, or services).
2. Regenerate Go code using protoc or buf (resulting in changes to .pb.go and sometimes .vtproto.pb.go files).
3. Update related model or builder files if necessary.
4. Commit all updated .proto and generated .pb.go files.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: **/*.proto, **/*.pb.go, **/*_vtproto.pb.go

