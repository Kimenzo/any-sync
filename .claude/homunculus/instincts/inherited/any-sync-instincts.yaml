# Any Sync Workflow Feature Development With Tests And Docs

## Action

Follow the feature-development-with-tests-and-docs workflow:
1. Implement the feature in multiple new or existing .go files.
2. Add or update test files (e.g., *_test.go) to cover the new functionality.
3. Add or update documentation files (e.g., docs/plans/*.md, README.md).
4. Update go.mod and go.sum if new dependencies are required.
5. Commit all related implementation, test, and documentation files.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: **/*.go, **/*_test.go, docs/**/*.md

